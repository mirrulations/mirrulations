services:
  nginx:
    image: nginx:1.21.0
    volumes:
      - ./mirrulations-nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - dashboard
    logging:
      driver: "local"
      options:
        max-size: "10m"
  redis:
    image: redis:6.2.4
    volumes:
      - "~/data/redis:/data"
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5
    logging:
      driver: "local"
      options:
        max-size: "10m"
  rabbitmq:
    build:
      context: .
      dockerfile: mirrulations-rabbitmq/Dockerfile
    hostname: 'mirrulations-rabbitmq'
    volumes:
      - "~/data/rabbitmq:/var/lib/rabbitmq/mnesia"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:15672" ]
      interval: 10s
      timeout: 10s
      retries: 5
    logging:
      driver: "local"
      options:
        max-size: "10m"
  work_generator:
    build:
      context: .
      dockerfile: mirrulations-work-generator/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: env_files/work_gen.env
    restart: always
    logging:
      driver: "local"
      options:
        max-size: "10m"
  dashboard:
    build:
      context: .
      dockerfile: mirrulations-dashboard/Dockerfile
    env_file: env_files/dashboard.env
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "local"
      options:
        max-size: "10m"
  client:
    build:
      context: .
      dockerfile: mirrulations-client/Dockerfile
    env_file: env_files/client.env
    volumes:
      - ~/data/data:/data
      - ./env_files/client_keys.json:/config/client_keys.json:ro
    restart: always
    logging:
      driver: "local"
      options:
        max-size: "10m"
